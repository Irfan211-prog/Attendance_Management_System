<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IIITDM Kurnool - Attendance Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/FrontPage.css">
</head>
<body>
  <div class="container">
    <!-- Logo -->
    <div class="logo-section">
      <img src="/assets/iiitdmk_logo.png" alt="IIITDM Kurnool Logo">
      <h1>IIITDM Kurnool</h1>
      <p>Indian Institute of Information Technology, Design & Manufacturing</p>
    </div>

    <!-- Attendance Card -->
    <div class="attendance-card">
      <h2>Attendance Portal</h2>
      <p>Select your role to continue</p>

      <div class="role-buttons">
        <a href="StudentLogin.html" class="role student">
          <div class="icon">🎓</div>
          <div class="text">
            <strong>Student Login</strong>
            <span>View attendance records & reports</span>
          </div>
        </a>

        <a href="FacultyLogin.html" class="role faculty">
          <div class="icon">👥</div>
          <div class="text">
            <strong>Faculty Login</strong>
            <span>Mark attendance & class reports</span>
          </div>
        </a>
      </div>
    </div>

    <!-- Footer -->
    <footer>
      <p>© 2026 IIITDM Kurnool — Attendance Management System</p>
    </footer>
  </div>
</body>
</html>
