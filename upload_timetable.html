<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Faculty Timetable System</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f9;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      margin: 0;
      padding: 30px;
    }

    /* 🔹 BACK BUTTON STYLE */
    .back-btn {
      background: #2d6cdf;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      display: inline-block;
      width: auto;          /* override global `button { width: 100% }` */
      margin: 20px auto 0; /* place at bottom nicely */
    }

    .back-btn:hover {
      background: #1b4fb8;
    }

    .box {
      background: white;
      padding: 25px;
      border-radius: 10px;
      box-shadow: 0 0 15px rgba(0,0,0,0.1);
      width: 700px;
      text-align: center;
    }

    input, button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    button {
      background: #2d6cdf;
      color: white;
      border: none;
      cursor: pointer;
      font-size: 16px;
    }

    button:hover {
      background: #1b4fb8;
    }

    table {
      width: 100%;
      margin-top: 15px;
      border-collapse: collapse;
    }

    th, td {
      border: 1px solid #ddd;
      padding: 8px;
      font-size: 14px;
    }

    th {
      background: #2d6cdf;
      color: white;
    }

    .delete-btn {
      background: red;
      color: white;
      border: none;
      padding: 5px 8px;
      cursor: pointer;
      border-radius: 4px;
    }

    .delete-btn:hover {
      background: darkred;
    }

    .section {
      margin-top: 20px;
      text-align: left;
    }

    .status {
      margin-top: 10px;
      font-size: 14px;
      color: green;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>Faculty Timetable System</h2>

  <!-- Upload -->
  <input type="file" id="pdf" accept="application/pdf" />
  <button onclick="upload()">Upload Timetable</button>

  <div id="uploadStatus" class="status"></div>

  <!-- View -->
  <div class="section">
    <h3>Your Timetable</h3>
    <button onclick="loadTimetable()">Load Timetable</button>

    <table>
      <thead>
        <tr>
          <th>Day</th>
          <th>Subject</th>
          <th>Year</th>
          <th>Start</th>
          <th>End</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>

  <!-- 🔹 BACK BUTTON (bottom of the page/box) -->
  <button class="back-btn" onclick="history.back()">← Back</button>
</div>

<script>
/* YOUR ORIGINAL JS — UNCHANGED */
async function upload() {
  const file = document.getElementById("pdf").files[0];
  const status = document.getElementById("uploadStatus");

  if (!file) {
    alert("Please select a PDF");
    return;
  }

  const formData = new FormData();
  formData.append("pdf", file);

  try {
    status.innerText = "Uploading...";

    const res = await fetch("/api/upload-timetable", {
      method: "POST",
      body: formData,
      credentials: "include"
    });

    const data = await res.json();

    status.innerText = `Uploaded: ${data.inserted} entries (Skipped duplicates: ${data.skipped || 0})`;

    loadTimetable();

  } catch (err) {
    status.innerText = "Upload failed";
  }
}

async function loadTimetable() {
  const res = await fetch("/api/timetable", {
    credentials: "include"
  });

  const data = await res.json();
  const tbody = document.getElementById("tableBody");

  tbody.innerHTML = "";

  data.forEach(row => {
    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td>${row.day}</td>
      <td>${row.subject}</td>
      <td>${row.year}</td>
      <td>${row.start_time}</td>
      <td>${row.end_time}</td>
      <td>
        <button class="delete-btn" onclick="deleteRow(${row.id})">
          Delete
        </button>
      </td>
    `;

    tbody.appendChild(tr);
  });
}

async function deleteRow(id) {
  if (!confirm("Are you sure you want to delete this class?")) return;

  const res = await fetch(`/api/timetable/${id}`, {
    method: "DELETE",
    credentials: "include"
  });

  const data = await res.json();

  alert(data.message);

  loadTimetable();
}
</script>

</body>
</html>
